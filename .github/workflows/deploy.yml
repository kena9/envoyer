name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []   # Add 'build' here once tests are passing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests -B

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: akuma-threads
          environment_name: akuma-threads-prod
          version_label: ${{ github.sha }}
          region: us-east-1
          deployment_package: target/akuma-threads-0.0.1-SNAPSHOT.jar

# -------------------------------------------------------
# TO ACTIVATE THIS WORKFLOW (your DevOps learning task):
#
# 1. Create an IAM user in AWS with ElasticBeanstalkFullAccess
# 2. Go to GitHub → Settings → Secrets → Actions
# 3. Add secrets:
#    - AWS_ACCESS_KEY_ID
#    - AWS_SECRET_ACCESS_KEY
# 4. Create your Elastic Beanstalk app named 'akuma-threads'
#    with environment 'akuma-threads-prod'
# -------------------------------------------------------
