<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Akuma Threads</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-sub">Log in to your Akuma Threads account</p>

        <!-- Success message after registration -->
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

        <!-- Error message on bad credentials -->
        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

        <!-- Logout message -->
        <div th:if="${logoutMsg}" class="alert alert-info" th:text="${logoutMsg}"></div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username"
                       placeholder="you@example.com" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn-primary btn-full">Log In</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Sign up</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
