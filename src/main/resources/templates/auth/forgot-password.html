<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body class="min-h-screen bg-[#0a0a0a] flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1 flex items-center justify-center px-4 py-20">
    <div class="w-full max-w-md">

        <!-- Back to login -->
        <a th:href="@{/login}"
           class="inline-flex items-center gap-2 font-mono text-[11px] tracking-[0.2em] uppercase text-[#555] hover:text-white transition-colors mb-10">
            ← Back to Login
        </a>

        <h1 class="font-mono text-2xl font-bold text-white tracking-tight mb-2">FORGOT PASSWORD</h1>
        <p class="text-[#666] text-sm mb-8">
            Enter the email address on your account and we'll send you a reset link.
        </p>

        <!-- Success message -->
        <div th:if="${successMsg}"
             class="mb-6 px-4 py-3 border border-green-700 bg-green-950/40 text-green-400 font-mono text-xs tracking-wide"
             th:text="${successMsg}"></div>

        <form th:action="@{/forgot-password}" method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label class="block font-mono text-[11px] tracking-[0.2em] uppercase text-[#555] mb-2">
                    Email Address
                </label>
                <input type="email" name="email" required autofocus
                       class="w-full bg-[#111] border border-[#222] text-white px-4 py-3 font-mono text-sm
                              focus:outline-none focus:border-[#e50914] transition-colors"
                       placeholder="you@example.com"/>
            </div>

            <button type="submit"
                    class="w-full bg-[#e50914] hover:bg-[#b8070f] text-white font-mono text-[11px]
                           tracking-[0.2em] uppercase py-4 transition-colors duration-200">
                SEND RESET LINK
            </button>
        </form>

        <p class="mt-8 text-center font-mono text-[11px] text-[#444]">
            Remembered it?
            <a th:href="@{/login}" class="text-[#e50914] hover:text-white transition-colors">Log in</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: themeScript}"></div>
</body>
</html>
