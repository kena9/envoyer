<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body class="min-h-screen bg-[#0a0a0a] flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1 flex items-center justify-center px-4 py-20">
    <div class="w-full max-w-md">

        <h1 class="font-mono text-2xl font-bold text-white tracking-tight mb-2">RESET PASSWORD</h1>
        <p class="text-[#666] text-sm mb-8">Choose a new password for your account.</p>

        <!-- Flash messages -->
        <div th:if="${errorMsg}"
             class="mb-6 px-4 py-3 border border-red-700 bg-red-950/40 text-red-400 font-mono text-xs tracking-wide"
             th:text="${errorMsg}"></div>

        <!-- Token expired / invalid -->
        <div th:if="${valid != null and !valid}"
             class="mb-6 px-4 py-3 border border-[#333] bg-[#111] text-[#888] font-mono text-xs tracking-wide">
            This reset link has expired or is invalid.
            <a th:href="@{/forgot-password}" class="text-[#e50914] hover:underline">Request a new one →</a>
        </div>

        <!-- Password form — only shown when token is valid -->
        <form th:if="${valid}" th:action="@{/reset-password}" method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="token" th:value="${token}"/>

            <div>
                <label class="block font-mono text-[11px] tracking-[0.2em] uppercase text-[#555] mb-2">
                    New Password
                </label>
                <input type="password" name="password" required minlength="8" autofocus
                       class="w-full bg-[#111] border border-[#222] text-white px-4 py-3 font-mono text-sm
                              focus:outline-none focus:border-[#e50914] transition-colors"
                       placeholder="At least 8 characters"/>
            </div>

            <div>
                <label class="block font-mono text-[11px] tracking-[0.2em] uppercase text-[#555] mb-2">
                    Confirm Password
                </label>
                <input type="password" name="confirmPassword" required minlength="8"
                       class="w-full bg-[#111] border border-[#222] text-white px-4 py-3 font-mono text-sm
                              focus:outline-none focus:border-[#e50914] transition-colors"
                       placeholder="Repeat your new password"/>
            </div>

            <button type="submit"
                    class="w-full bg-[#e50914] hover:bg-[#b8070f] text-white font-mono text-[11px]
                           tracking-[0.2em] uppercase py-4 transition-colors duration-200">
                SAVE NEW PASSWORD
            </button>
        </form>

        <p class="mt-8 text-center font-mono text-[11px] text-[#444]">
            <a th:href="@{/login}" class="text-[#e50914] hover:text-white transition-colors">← Back to Login</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: themeScript}"></div>
</body>
</html>
