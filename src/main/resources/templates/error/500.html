<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>

<head th:replace="~{fragments/layout :: head('Something Went Wrong')}"></head>

<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1 flex items-center justify-center px-6 py-20">
    <div class="text-center max-w-lg">
        <p class="font-mono text-[10px] tracking-[0.35em] uppercase text-[#e50914] mb-6">Error 500</p>
        <h1 style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
                   font-size: clamp(5rem, 18vw, 12rem);
                   line-height: 0.85;
                   letter-spacing: -0.02em;
                   color: #1a1a1a;">
            500
        </h1>
        <p class="font-mono text-[13px] text-[#555] mt-6 mb-10 tracking-[0.05em]">
            Something went wrong on our end. We're on it.
        </p>
        <a th:href="@{/}"
           class="font-mono text-[11px] tracking-[0.25em] uppercase font-bold
                  bg-[#e50914] text-white px-8 py-4 inline-block
                  hover:bg-[#b8070f] transition-colors duration-200">
            BACK TO HOME
        </a>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: themeScript}"></div>

</body>
</html>
