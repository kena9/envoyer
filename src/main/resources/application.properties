# =============================================
# Akuma Threads - Application Configuration
# =============================================

# Application name
spring.application.name=akuma-threads

# Server port
server.port=8080

# =============================================
# DATABASE - MySQL
# =============================================
# Replace 'your_password' with your MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/akuma_threads?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=#Kenaket123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# 'update' auto-creates/updates tables from your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================
# FILE UPLOADS (product images)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# LOGGING
# =============================================
logging.level.com.akumathreads=DEBUG
logging.level.org.springframework.security=INFO

# =============================================
# SESSION
# =============================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# same-site=strict set at TomcatContextCustomizer level in SecurityConfig
# secure=false in dev (HTTP); set to true in application-prod.properties
