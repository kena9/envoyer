# =============================================
# PRODUCTION PROFILE — AWS
# =============================================
# This file is safe to commit to Git — it contains ONLY ${ENV_VAR} placeholders,
# no real secrets. Set the actual values as environment variables in the
# AWS Elastic Beanstalk console under Configuration → Software → Environment properties.
#
# Required environment variables to set in AWS:
#
#   DB_URL          = jdbc:mysql://<rds-endpoint>:3306/akuma_threads?useSSL=true&serverTimezone=UTC
#   DB_USERNAME     = <rds-username>
#   DB_PASSWORD     = <rds-password>
#
#   GMAIL_USERNAME      = <your-gmail-address>
#   GMAIL_APP_PASSWORD  = <your-16-char-app-password>
#
#   STRIPE_PUBLISHABLE_KEY = pk_live_...
#   STRIPE_SECRET_KEY      = sk_live_...
#
#   PRINTFUL_API_KEY = <your-printful-token>
#
#   APP_BASE_URL = https://yourdomain.com
# =============================================

# ── Database (AWS RDS) ───────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# IMPORTANT: Use 'update' for your FIRST deployment so Hibernate creates all tables.
# After the first successful start, change this to 'validate' and redeploy.
# 'validate' is safer in production — it stops the app if any entity is out of sync
# instead of silently altering your live data.
spring.jpa.hibernate.ddl-auto=validate

# Turn off SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.akumathreads=INFO
logging.level.org.springframework.security=WARN

# ── Session / Cookies (HTTPS only in prod) ──────────────────────────────────
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# ── Base URL (used in password-reset emails, etc.) ──────────────────────────
app.base-url=${APP_BASE_URL:https://yourdomain.com}

# ── Email (Gmail SMTP) ───────────────────────────────────────────────────────
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}

# ── Stripe (use LIVE keys in production) ────────────────────────────────────
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# ── Printful ─────────────────────────────────────────────────────────────────
printful.api.key=${PRINTFUL_API_KEY}

# ── Server ───────────────────────────────────────────────────────────────────
# Elastic Beanstalk routes traffic to port 5000 by default for Java apps
server.port=5000
